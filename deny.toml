[advisories]
vulnerability = "deny"
unmaintained = "warn"
yanked = "warn"
notice = "warn"

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 OR MIT",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-DFS-2016",
]
copyleft = "warn"
allow-osi-fsf-free = true
confidence = 70

[bans]
multiple-versions = "warn"
wildcards = "warn"
